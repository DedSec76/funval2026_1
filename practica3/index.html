<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="./style.css">
    <title>Landing Page Simple</title>
</head>
<body>
    <header class="myHeader">
        <h1>Welcome to My Website</h1>
    </header>
    <nav class="navegation">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <section class="myHero">
            <h2>Hero Section</h2>
            <p>This is a paragraph inside the hero section.</p>
            <button>Click Me</button>

            <img src="./images/icon.webp" width="200" alt="Imagen principal del hero">
        </section>
        <section class="mySection">
            <h2>Section Title</h2>

            <div class="mySection__content">
                <p>This is a paragraph inside a div.</p>
                <ul>
                    <li>List item 1</li>
                    <li>List item 2</li>
                    <li>List item 3</li>
                </ul>
                <p>Another paragraph with more content.</p>
            </div>
        </section>
    </main>

    <footer class="myFooter">
        <p>&copy; 2026 Algunos Derechos Reservados</p>
    </footer>
</body>
</html>
